components:
  schemas:
    BatchData:
      properties:
        batch_id:
          title: Batch Id
          type: string
        completed_at:
          title: Completed At
          type: string
        completed_games:
          title: Completed Games
          type: integer
        failed_games:
          title: Failed Games
          type: integer
        results:
          items:
            $ref: "#/components/schemas/BatchGameResult"
          title: Results
          type: array
        started_at:
          title: Started At
          type: string
        status:
          enum:
            - completed
            - partial
            - failed
          title: Status
          type: string
        total_duration_ms:
          title: Total Duration Ms
          type: integer
        total_games:
          title: Total Games
          type: integer
      required:
        - batch_id
        - status
        - total_games
        - completed_games
        - failed_games
        - started_at
        - completed_at
        - total_duration_ms
        - results
      title: BatchData
      type: object
    BatchGameRequest:
      properties:
        config:
          allOf:
            - $ref: "#/components/schemas/SimulationConfigIn"
          nullable: true
        game_id:
          title: Game Id
          type: string
      required:
        - game_id
      title: BatchGameRequest
      type: object
    BatchGameResult:
      properties:
        cached:
          default: false
          title: Cached
          type: boolean
        error:
          nullable: true
          title: Error
          type: string
        game_id:
          title: Game Id
          type: string
        result:
          allOf:
            - $ref: "#/components/schemas/BatchResultSummary"
          nullable: true
        simulation_run_id:
          nullable: true
          title: Simulation Run Id
          type: string
        status:
          title: Status
          type: string
      required:
        - game_id
        - status
      title: BatchGameResult
      type: object
    BatchRequest:
      properties:
        default_config:
          allOf:
            - $ref: "#/components/schemas/SimulationConfigIn"
          default:
            convergence_threshold: 0.005
            iterations: 10000
            plugin_config: {}
        force_refresh:
          default: false
          title: Force Refresh
          type: boolean
        games:
          items:
            $ref: "#/components/schemas/BatchGameRequest"
          maxItems: 50
          minItems: 1
          title: Games
          type: array
      required:
        - games
      title: BatchRequest
      type: object
    BatchResultSummary:
      properties:
        away_win_probability:
          title: Away Win Probability
          type: number
        home_win_probability:
          title: Home Win Probability
          type: number
        mean_margin:
          title: Mean Margin
          type: number
        mean_total:
          title: Mean Total
          type: number
      required:
        - home_win_probability
        - away_win_probability
        - mean_total
        - mean_margin
      title: BatchResultSummary
      type: object
    CorrelationsData:
      description: "Same-game parlay correlation artifact for one simulation run (Phase
        7 Wave 1).


        ``legs`` uses the canonical leg vocabulary (``MONEYLINE:HOME``,

        ``SPREAD:HOME:-1.5``, ``TOTAL:OVER:2.5``, ...; lines rendered with %g).

        ``matrix`` is the pairwise phi/Pearson correlation matrix aligned with

        ``legs`` (unit diagonal; zero-variance legs correlate 0.0 with everything).

        ``joint_probability`` is present only when specific legs were requested:

        the empirical Monte Carlo probability that ALL requested legs hit in the

        same iteration (pushes count as misses). ``joint_goal_grid`` is the

        analytic joint score PMF (rows = home score) for Poisson-grid sports

        (soccer regulation, hockey pre-OT regulation); null elsewhere."
      properties:
        game_id:
          title: Game Id
          type: string
        iterations:
          title: Iterations
          type: integer
        joint_goal_grid:
          items:
            items:
              type: number
            type: array
          nullable: true
          title: Joint Goal Grid
          type: array
        joint_probability:
          nullable: true
          title: Joint Probability
          type: number
        legs:
          items:
            type: string
          title: Legs
          type: array
        marginals:
          additionalProperties:
            type: number
          title: Marginals
          type: object
        matrix:
          items:
            items:
              type: number
            type: array
          title: Matrix
          type: array
        simulation_run_id:
          title: Simulation Run Id
          type: string
      required:
        - simulation_run_id
        - game_id
        - iterations
        - legs
        - marginals
        - matrix
      title: CorrelationsData
      type: object
    Distribution:
      properties:
        max:
          title: Max
          type: integer
        mean:
          title: Mean
          type: number
        min:
          title: Min
          type: integer
        std_dev:
          title: Std Dev
          type: number
        type:
          default: discrete
          title: Type
          type: string
        values:
          additionalProperties:
            type: number
          title: Values
          type: object
      required:
        - values
        - mean
        - std_dev
        - min
        - max
      title: Distribution
      type: object
    DistributionsData:
      properties:
        distributions:
          additionalProperties:
            $ref: "#/components/schemas/Distribution"
          title: Distributions
          type: object
        game_id:
          title: Game Id
          type: string
        iterations_completed:
          title: Iterations Completed
          type: integer
        simulation_run_id:
          title: Simulation Run Id
          type: string
      required:
        - simulation_run_id
        - game_id
        - iterations_completed
        - distributions
      title: DistributionsData
      type: object
    Envelope_BatchData_:
      properties:
        data:
          $ref: "#/components/schemas/BatchData"
        meta:
          $ref: "#/components/schemas/Meta"
      required:
        - data
        - meta
      title: Envelope[BatchData]
      type: object
    Envelope_CorrelationsData_:
      properties:
        data:
          $ref: "#/components/schemas/CorrelationsData"
        meta:
          $ref: "#/components/schemas/Meta"
      required:
        - data
        - meta
      title: Envelope[CorrelationsData]
      type: object
    Envelope_DistributionsData_:
      properties:
        data:
          $ref: "#/components/schemas/DistributionsData"
        meta:
          $ref: "#/components/schemas/Meta"
      required:
        - data
        - meta
      title: Envelope[DistributionsData]
      type: object
    Envelope_HealthData_:
      properties:
        data:
          $ref: "#/components/schemas/HealthData"
        meta:
          $ref: "#/components/schemas/Meta"
      required:
        - data
        - meta
      title: Envelope[HealthData]
      type: object
    Envelope_SimulationRunData_:
      properties:
        data:
          $ref: "#/components/schemas/SimulationRunData"
        meta:
          $ref: "#/components/schemas/Meta"
      required:
        - data
        - meta
      title: Envelope[SimulationRunData]
      type: object
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: "#/components/schemas/ValidationError"
          title: Detail
          type: array
      title: HTTPValidationError
      type: object
    HealthData:
      properties:
        dependencies:
          additionalProperties:
            type: string
          title: Dependencies
          type: object
        load:
          $ref: "#/components/schemas/HealthLoad"
        service:
          default: simulation-engine
          title: Service
          type: string
        status:
          title: Status
          type: string
        uptime_seconds:
          title: Uptime Seconds
          type: integer
        version:
          title: Version
          type: string
      required:
        - status
        - version
        - uptime_seconds
        - dependencies
        - load
      title: HealthData
      type: object
    HealthLoad:
      properties:
        active_simulations:
          title: Active Simulations
          type: integer
        avg_duration_ms:
          title: Avg Duration Ms
          type: integer
        max_concurrent:
          title: Max Concurrent
          type: integer
        queued_simulations:
          title: Queued Simulations
          type: integer
        simulations_today:
          title: Simulations Today
          type: integer
      required:
        - active_simulations
        - queued_simulations
        - max_concurrent
        - simulations_today
        - avg_duration_ms
      title: HealthLoad
      type: object
    Meta:
      properties:
        request_id:
          title: Request Id
          type: string
        timestamp:
          format: date-time
          title: Timestamp
          type: string
      required:
        - timestamp
        - request_id
      title: Meta
      type: object
    Percentiles:
      properties:
        margin:
          additionalProperties:
            type: integer
          title: Margin
          type: object
        total:
          additionalProperties:
            type: integer
          title: Total
          type: object
      required:
        - margin
        - total
      title: Percentiles
      type: object
    SimulationConfigIn:
      properties:
        convergence_threshold:
          default: 0.005
          exclusiveMinimum: true
          minimum: 0.0
          title: Convergence Threshold
          type: number
        iterations:
          default: 10000
          maximum: 50000.0
          minimum: 100.0
          title: Iterations
          type: integer
        plugin_config:
          additionalProperties: true
          title: Plugin Config
          type: object
        random_seed:
          nullable: true
          title: Random Seed
          type: integer
      title: SimulationConfigIn
      type: object
    SimulationConfigOut:
      properties:
        convergence_threshold:
          title: Convergence Threshold
          type: number
        iterations:
          title: Iterations
          type: integer
        random_seed:
          nullable: true
          title: Random Seed
          type: integer
        sport:
          title: Sport
          type: string
      required:
        - sport
        - iterations
        - convergence_threshold
      title: SimulationConfigOut
      type: object
    SimulationRequest:
      properties:
        config:
          allOf:
            - $ref: "#/components/schemas/SimulationConfigIn"
          default:
            convergence_threshold: 0.005
            iterations: 10000
            plugin_config: {}
        force_refresh:
          default: false
          title: Force Refresh
          type: boolean
        game_id:
          title: Game Id
          type: string
      required:
        - game_id
      title: SimulationRequest
      type: object
    SimulationResultData:
      description: "Aggregated simulation result.


        ``spread_push_probabilities`` / ``total_push_probabilities`` carry

        P(margin == line) / P(total == line) for INTEGER lines only — half-point

        lines cannot push and are omitted rather than serialized as 0.0. Cover

        and over probabilities are unchanged: strictly-greater-than semantics."
      properties:
        away_win_probability:
          title: Away Win Probability
          type: number
        draw_probability:
          title: Draw Probability
          type: number
        home_win_probability:
          title: Home Win Probability
          type: number
        id:
          title: Id
          type: string
        mean_away_score:
          title: Mean Away Score
          type: number
        mean_home_score:
          title: Mean Home Score
          type: number
        mean_margin:
          title: Mean Margin
          type: number
        mean_total:
          title: Mean Total
          type: number
        percentiles:
          $ref: "#/components/schemas/Percentiles"
        spread_cover_probabilities:
          additionalProperties:
            type: number
          title: Spread Cover Probabilities
          type: object
        spread_push_probabilities:
          additionalProperties:
            type: number
          title: Spread Push Probabilities
          type: object
        total_over_probabilities:
          additionalProperties:
            type: number
          title: Total Over Probabilities
          type: object
        total_push_probabilities:
          additionalProperties:
            type: number
          title: Total Push Probabilities
          type: object
      required:
        - id
        - home_win_probability
        - away_win_probability
        - draw_probability
        - mean_home_score
        - mean_away_score
        - mean_total
        - mean_margin
        - spread_cover_probabilities
        - total_over_probabilities
        - percentiles
      title: SimulationResultData
      type: object
    SimulationRunData:
      properties:
        batch_id:
          nullable: true
          title: Batch Id
          type: string
        cached:
          default: false
          title: Cached
          type: boolean
        completed_at:
          title: Completed At
          type: string
        config:
          $ref: "#/components/schemas/SimulationConfigOut"
        converged:
          title: Converged
          type: boolean
        duration_ms:
          title: Duration Ms
          type: integer
        game_id:
          title: Game Id
          type: string
        iterations_completed:
          title: Iterations Completed
          type: integer
        parameters_hash:
          title: Parameters Hash
          type: string
        result:
          $ref: "#/components/schemas/SimulationResultData"
        simulation_run_id:
          title: Simulation Run Id
          type: string
        started_at:
          title: Started At
          type: string
        status:
          title: Status
          type: string
      required:
        - simulation_run_id
        - game_id
        - status
        - config
        - started_at
        - completed_at
        - duration_ms
        - iterations_completed
        - converged
        - parameters_hash
        - result
      title: SimulationRunData
      type: object
    ValidationError:
      properties:
        ctx:
          title: Context
          type: object
        input:
          title: Input
        loc:
          items:
            anyOf:
              - type: string
              - type: integer
          title: Location
          type: array
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
      required:
        - loc
        - msg
        - type
      title: ValidationError
      type: object
info:
  contact:
    email: jsamuelsen11@gmail.com
    name: BookieBreaker
    url: https://github.com/Bookie-Breaker
  description: Monte Carlo simulations for sports outcome distributions.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  title: BookieBreaker Simulation Engine
  version: 1.0.0
openapi: 3.0.3
paths:
  /api/v1/sim/games/{game_id}/latest:
    get:
      description: Get the most recent simulation results for a game.
      operationId: get_latest_simulation_api_v1_sim_games__game_id__latest_get
      parameters:
        - description: The statistics-service game identifier.
          in: path
          name: game_id
          required: true
          schema:
            description: The statistics-service game identifier.
            title: Game Id
            type: string
        - description: If true, trigger a fresh default-config simulation instead of
            returning cached.
          in: query
          name: force_refresh
          required: false
          schema:
            default: false
            description: If true, trigger a fresh default-config simulation instead
              of returning cached.
            title: Force Refresh
            type: boolean
        - description: Reserved for stored simulation configs; accepted and ignored
            in Phase 2.
          in: query
          name: config_id
          required: false
          schema:
            description: Reserved for stored simulation configs; accepted and ignored
              in Phase 2.
            nullable: true
            title: Config Id
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope_SimulationRunData_"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Get Latest Simulation
      tags:
        - games
  /api/v1/sim/health:
    get:
      description: "Liveness plus dependency status. Returns 200 even when degraded
        so

        container healthchecks measure this service, not its dependencies."
      operationId: get_health_api_v1_sim_health_get
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope_HealthData_"
          description: Successful Response
      summary: Get Health
      tags:
        - health
  /api/v1/sim/simulations:
    post:
      description: "Run a Monte Carlo simulation for a game.


        Returns a cached result when an identical parameters_hash exists and

        force_refresh is false."
      operationId: create_simulation_api_v1_sim_simulations_post
      parameters:
        - description: UUID for idempotent submission (replayed for 24 hours).
          in: header
          name: x-idempotency-key
          required: false
          schema:
            description: UUID for idempotent submission (replayed for 24 hours).
            nullable: true
            title: X-Idempotency-Key
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SimulationRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope_SimulationRunData_"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Create Simulation
      tags:
        - simulations
  /api/v1/sim/simulations/batch:
    post:
      description: "Simulate multiple games in parallel.


        Per-game failures do not fail the batch; the batch status is

        completed, partial, or failed."
      operationId: create_batch_api_v1_sim_simulations_batch_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope_BatchData_"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Create Batch
      tags:
        - simulations
  /api/v1/sim/simulations/{simulation_id}:
    get:
      description: Get the results of a specific simulation run (results expire after
        2 hours).
      operationId: get_simulation_api_v1_sim_simulations__simulation_id__get
      parameters:
        - description: The simulation run identifier.
          in: path
          name: simulation_id
          required: true
          schema:
            description: The simulation run identifier.
            title: Simulation Id
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope_SimulationRunData_"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Get Simulation
      tags:
        - simulations
  /api/v1/sim/simulations/{simulation_id}/correlations:
    get:
      description: "Get the same-game parlay correlation artifact for a simulation
        run.


        Returns leg marginals and the pairwise phi correlation matrix over the

        canonical leg vocabulary; with ?legs= the empirical joint probability of

        the requested leg set (the exact Monte Carlo joint, not a copula

        approximation). Poisson-grid sports (soccer/hockey) also expose the

        analytic joint goal grid."
      operationId: get_simulation_correlations_api_v1_sim_simulations__simulation_id__correlations_get
      parameters:
        - description: The simulation run identifier.
          in: path
          name: simulation_id
          required: true
          schema:
            description: The simulation run identifier.
            title: Simulation Id
            type: string
        - description: Comma-separated canonical leg keys (e.g. 'MONEYLINE:HOME,TOTAL:OVER:2.5').
            When given, the response is restricted to those legs and includes their
            empirical joint probability. Omit for the full default artifact.
          in: query
          name: legs
          required: false
          schema:
            description: Comma-separated canonical leg keys (e.g. 'MONEYLINE:HOME,TOTAL:OVER:2.5').
              When given, the response is restricted to those legs and includes their
              empirical joint probability. Omit for the full default artifact.
            nullable: true
            title: Legs
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope_CorrelationsData_"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Get Simulation Correlations
      tags:
        - simulations
  /api/v1/sim/simulations/{simulation_id}/distributions:
    get:
      description: Get raw score/margin/total distributions for a simulation, suitable
        for visualization.
      operationId: get_simulation_distributions_api_v1_sim_simulations__simulation_id__distributions_get
      parameters:
        - description: The simulation run identifier.
          in: path
          name: simulation_id
          required: true
          schema:
            description: The simulation run identifier.
            title: Simulation Id
            type: string
        - description: Which distributions to return; 'all' returns every distribution.
          in: query
          name: distribution_type
          required: false
          schema:
            default: all
            description: Which distributions to return; 'all' returns every distribution.
            enum:
              - margin
              - total
              - home_score
              - away_score
              - all
            title: Distribution Type
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope_DistributionsData_"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Get Simulation Distributions
      tags:
        - simulations
servers:
  - description: Local development
    url: http://localhost:8003
tags:
  - description: Game-scoped simulation lookups.
    name: games
  - description: Service health and load.
    name: health
  - description: Run Monte Carlo simulations and fetch their results.
    name: simulations
