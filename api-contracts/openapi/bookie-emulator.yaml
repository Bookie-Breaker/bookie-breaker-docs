info:
  contact:
    email: jsamuelsen11@gmail.com
    name: BookieBreaker
    url: https://github.com/Bookie-Breaker
  description: "Paper trading: places virtual bets on detected edges, grades them
    on game completion, and tracks ROI, CLV, calibration, and bankroll performance."
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  title: BookieBreaker Bookie Emulator
  version: 1.0.0
openapi: 3.0.3
paths:
  /api/v1/emulator/bankroll:
    get:
      description: "Current bankroll: starting units plus cumulative graded P/L, with
        open exposure."
      operationId: get_bankroll_api_v1_emulator_bankroll_get
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope_BankrollData_"
          description: Successful Response
      summary: Get Bankroll
      tags:
        - bankroll
  /api/v1/emulator/bankroll/history:
    get:
      description: Bankroll snapshots for charting; daily/weekly keep the last snapshot
        per bucket.
      operationId: get_bankroll_history_api_v1_emulator_bankroll_history_get
      parameters:
        - description: "Start date (ISO 8601). Default: 30 days ago."
          in: query
          name: date_from
          required: false
          schema:
            description: "Start date (ISO 8601). Default: 30 days ago."
            format: date-time
            nullable: true
            title: Date From
            type: string
        - description: "End date (ISO 8601). Default: now."
          in: query
          name: date_to
          required: false
          schema:
            description: "End date (ISO 8601). Default: now."
            format: date-time
            nullable: true
            title: Date To
            type: string
        - description: per_bet, daily, or weekly.
          in: query
          name: interval
          required: false
          schema:
            default: daily
            description: per_bet, daily, or weekly.
            enum:
              - per_bet
              - daily
              - weekly
            title: Interval
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope_BankrollHistoryData_"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Get Bankroll History
      tags:
        - bankroll
  /api/v1/emulator/bets:
    get:
      description: "The bet ledger: cursor-paginated bets ordered by placed_at descending."
      operationId: list_bets_api_v1_emulator_bets_get
      parameters:
        - description: Filter by league.
          in: query
          name: league
          required: false
          schema:
            description: Filter by league.
            enum:
              - NFL
              - NBA
              - MLB
              - NCAA_FB
              - NCAA_BB
              - NCAA_BSB
            nullable: true
            title: League
            type: string
        - description: Filter by market type.
          in: query
          name: market_type
          required: false
          schema:
            description: Filter by market type.
            enum:
              - SPREAD
              - TOTAL
              - MONEYLINE
            nullable: true
            title: Market Type
            type: string
        - description: Filter by result.
          in: query
          name: result
          required: false
          schema:
            description: Filter by result.
            enum:
              - PENDING
              - WIN
              - LOSS
              - PUSH
              - VOID
            nullable: true
            title: Result
            type: string
        - description: Start date (ISO 8601), inclusive, on placed_at.
          in: query
          name: date_from
          required: false
          schema:
            description: Start date (ISO 8601), inclusive, on placed_at.
            format: date-time
            nullable: true
            title: Date From
            type: string
        - description: End date (ISO 8601), inclusive, on placed_at.
          in: query
          name: date_to
          required: false
          schema:
            description: End date (ISO 8601), inclusive, on placed_at.
            format: date-time
            nullable: true
            title: Date To
            type: string
        - description: Minimum edge percentage.
          in: query
          name: min_edge
          required: false
          schema:
            description: Minimum edge percentage.
            nullable: true
            title: Min Edge
            type: number
        - description: open for pending, graded for completed, or all.
          in: query
          name: status
          required: false
          schema:
            default: all
            description: open for pending, graded for completed, or all.
            enum:
              - open
              - graded
              - all
            title: Status
            type: string
        - description: Max results per page.
          in: query
          name: limit
          required: false
          schema:
            default: 50
            description: Max results per page.
            maximum: 200
            minimum: 1
            title: Limit
            type: integer
        - description: Opaque pagination cursor from a previous page.
          in: query
          name: cursor
          required: false
          schema:
            description: Opaque pagination cursor from a previous page.
            nullable: true
            title: Cursor
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PagedEnvelope_list_BetData__"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: List Bets
      tags:
        - bets
    post:
      description: "Place a paper bet, capturing current odds from lines-service.


        Replaying an X-Idempotency-Key returns the existing bet with 200 OK."
      operationId: place_bet_api_v1_emulator_bets_post
      parameters:
        - description: UUID preventing duplicate placement on retries.
          in: header
          name: x-idempotency-key
          required: true
          schema:
            description: UUID preventing duplicate placement on retries.
            title: X-Idempotency-Key
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaceBetRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope_BetData_"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Place Bet
      tags:
        - bets
  /api/v1/emulator/bets/{bet_id}:
    get:
      description: Get a bet with its grade details when graded.
      operationId: get_bet_api_v1_emulator_bets__bet_id__get
      parameters:
        - description: The paper bet identifier.
          in: path
          name: bet_id
          required: true
          schema:
            description: The paper bet identifier.
            format: uuid
            title: Bet Id
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope_BetDetailData_"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Get Bet
      tags:
        - bets
  /api/v1/emulator/bets/{bet_id}/grade:
    post:
      description: "Manually grade a bet from the statistics-service game result.


        Used when automatic grading (game.completed event or the fallback

        poller) has not fired. force=true re-grades an already-graded bet."
      operationId: grade_bet_api_v1_emulator_bets__bet_id__grade_post
      parameters:
        - description: The paper bet identifier.
          in: path
          name: bet_id
          required: true
          schema:
            description: The paper bet identifier.
            format: uuid
            title: Bet Id
            type: string
      requestBody:
        content:
          application/json:
            schema:
              allOf:
                - $ref: "#/components/schemas/GradeRequest"
              nullable: true
              title: Request
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope_BetDetailData_"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Grade Bet
      tags:
        - bets
  /api/v1/emulator/health:
    get:
      description: "Liveness plus dependency status. Returns 200 even when degraded
        so

        container healthchecks measure this service, not its dependencies."
      operationId: get_health_api_v1_emulator_health_get
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope_HealthData_"
          description: Successful Response
      summary: Get Health
      tags:
        - health
  /api/v1/emulator/performance:
    get:
      description: Aggregate performance metrics over graded bets.
      operationId: get_performance_api_v1_emulator_performance_get
      parameters:
        - description: Filter by league.
          in: query
          name: league
          required: false
          schema:
            description: Filter by league.
            enum:
              - NFL
              - NBA
              - MLB
              - NCAA_FB
              - NCAA_BB
              - NCAA_BSB
            nullable: true
            title: League
            type: string
        - description: Filter by market type.
          in: query
          name: market_type
          required: false
          schema:
            description: Filter by market type.
            enum:
              - SPREAD
              - TOTAL
              - MONEYLINE
            nullable: true
            title: Market Type
            type: string
        - description: Start date (ISO 8601) on placed_at.
          in: query
          name: date_from
          required: false
          schema:
            description: Start date (ISO 8601) on placed_at.
            format: date-time
            nullable: true
            title: Date From
            type: string
        - description: End date (ISO 8601) on placed_at.
          in: query
          name: date_to
          required: false
          schema:
            description: End date (ISO 8601) on placed_at.
            format: date-time
            nullable: true
            title: Date To
            type: string
        - description: Rolling window applied to graded_at.
          in: query
          name: window
          required: false
          schema:
            default: all_time
            description: Rolling window applied to graded_at.
            enum:
              - daily
              - weekly
              - monthly
              - all_time
            title: Window
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope_PerformanceData_"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Get Performance
      tags:
        - performance
  /api/v1/emulator/performance/breakdown:
    get:
      description: Performance broken down by league, market type, sportsbook, or
        month.
      operationId: get_breakdown_api_v1_emulator_performance_breakdown_get
      parameters:
        - description: Grouping dimension.
          in: query
          name: group_by
          required: false
          schema:
            default: league
            description: Grouping dimension.
            enum:
              - league
              - market_type
              - sportsbook
              - month
            title: Group By
            type: string
        - description: Start date (ISO 8601) on placed_at.
          in: query
          name: date_from
          required: false
          schema:
            description: Start date (ISO 8601) on placed_at.
            format: date-time
            nullable: true
            title: Date From
            type: string
        - description: End date (ISO 8601) on placed_at.
          in: query
          name: date_to
          required: false
          schema:
            description: End date (ISO 8601) on placed_at.
            format: date-time
            nullable: true
            title: Date To
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope_BreakdownData_"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Get Breakdown
      tags:
        - performance
