openapi: "3.1.0"
info:
  title: BookieBreaker Statistics Service
  version: "1.0.0"
  description: >
    Ingests, normalizes, and serves sports statistics from external APIs.
    Acts as a cache and enrichment layer over external data sources.
  contact:
    name: BookieBreaker
    url: https://github.com/Bookie-Breaker
    email: jsamuelsen11@gmail.com
  license:
    name: MIT
    url: https://opensource.org/license/mit/

servers:
  - url: http://localhost:8002
    description: Local development

tags:
  - name: games
    description: Game listings, details, box scores, and results
  - name: health
    description: Service health and dependency status checks
  - name: injuries
    description: Current injury reports across leagues and teams
  - name: leagues
    description: Supported leagues and their season metadata
  - name: matchup
    description: Head-to-head matchup context between two teams
  - name: players
    description: Player rosters, details, and season statistics
  - name: schedule
    description: Upcoming game schedules by league, team, and date range
  - name: teams
    description: Team records, details, and statistical profiles
  - name: venues
    description: Venue details including location and characteristics

paths:
  /api/v1/stats/health:
    get:
      operationId: getHealth
      summary: Service health check
      description: >
        Reports the current health of the statistics service and its
        dependencies, including per-dependency status and latency.
      tags: [health]
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: Service is unhealthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /api/v1/stats/teams:
    get:
      operationId: getTeams
      summary: List teams with optional filters
      description: >
        Returns a paginated list of teams across supported leagues. Results
        can be narrowed by league, season, conference, division, and active
        status.
      tags: [teams]
      parameters:
        - name: league
          in: query
          schema:
            type: string
          description: Filter by league (comma-separated)
        - name: season
          in: query
          schema:
            type: integer
          description: Filter by season year
        - name: conference
          in: query
          schema:
            type: string
          description: Filter by conference name
        - name: division
          in: query
          schema:
            type: string
          description: Filter by division name
        - name: active
          in: query
          schema:
            type: boolean
            default: true
          description: Filter by active status (true returns only active teams)
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Team list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamListResponse"

  /api/v1/stats/teams/{team_id}:
    get:
      operationId: getTeamById
      summary: Get team details with season summary
      description: >
        Returns full details for a single team, including its home venue and
        a summary of the current season record and scoring averages.
      tags: [teams]
      parameters:
        - $ref: "#/components/parameters/TeamId"
      responses:
        "200":
          description: Team found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamDetailResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/stats/teams/{team_id}/stats:
    get:
      operationId: getTeamStats
      summary: Get detailed team statistics
      description: >
        Returns offensive, defensive, and advanced statistics for a team,
        with optional season selection, stat-type filtering, rolling-window
        averages, and home/away splits.
      tags: [teams]
      parameters:
        - $ref: "#/components/parameters/TeamId"
        - name: season
          in: query
          schema:
            type: integer
          description: Season year to return stats for (defaults to current)
        - name: stat_type
          in: query
          schema:
            type: string
            enum: [offensive, defensive, overall, advanced, all]
            default: all
          description: >-
            Category of stats to return: offensive, defensive, overall,
            advanced, or all
        - name: rolling_window
          in: query
          schema:
            type: integer
          description: Rolling average over last N games
      responses:
        "200":
          description: Team stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamStatsResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/stats/players:
    get:
      operationId: getPlayers
      summary: List players with optional filters
      description: >
        Returns a paginated list of players. Results can be filtered by
        team, league, position, and roster status such as ACTIVE or INJURED.
      tags: [players]
      parameters:
        - name: team_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by team UUID
        - name: league
          in: query
          schema:
            type: string
          description: Filter by league
        - name: position
          in: query
          schema:
            type: string
          description: Filter by player position
        - name: status
          in: query
          schema:
            type: string
            enum: [ACTIVE, INJURED, OUT, SUSPENDED, INACTIVE]
          description: >-
            Filter by roster status: ACTIVE, INJURED, OUT, SUSPENDED, or
            INACTIVE
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Player list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerListResponse"

  /api/v1/stats/players/{player_id}:
    get:
      operationId: getPlayerById
      summary: Get player details with season stats
      description: >
        Returns full details for a single player, including current status,
        experience, and per-game season statistics for the requested season.
      tags: [players]
      parameters:
        - $ref: "#/components/parameters/PlayerId"
        - name: season
          in: query
          schema:
            type: integer
          description: Season year to return stats for (defaults to current)
        - name: stat_type
          in: query
          schema:
            type: string
            default: all
          description: Category of stats to return (defaults to all)
        - name: game_log
          in: query
          schema:
            type: boolean
            default: false
          description: Include the player's per-game log when true
      responses:
        "200":
          description: Player found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerDetailResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/stats/games:
    get:
      operationId: getGames
      summary: List games with optional filters
      description: >
        Returns a paginated list of games with scores and results where
        available. Results can be filtered by league, date range, team,
        game status, and season.
      tags: [games]
      parameters:
        - name: league
          in: query
          schema:
            type: string
          description: Filter by league
        - name: date_from
          in: query
          schema:
            type: string
            format: date
          description: Include games on or after this date (YYYY-MM-DD)
        - name: date_to
          in: query
          schema:
            type: string
            format: date
          description: Include games on or before this date (YYYY-MM-DD)
        - name: team
          in: query
          schema:
            type: string
          description: Team UUID or abbreviation
        - name: status
          in: query
          schema:
            type: string
          description: Game status (comma-separated)
        - name: season
          in: query
          schema:
            type: integer
          description: Filter by season year
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Game list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameListResponse"

  /api/v1/stats/games/{game_id}:
    get:
      operationId: getGameById
      summary: Get game details with result if completed
      description: >
        Returns full details for a single game, including teams, venue,
        scheduled start, status, and the final result when the game has
        completed.
      tags: [games]
      parameters:
        - $ref: "#/components/parameters/GameIdPath"
      responses:
        "200":
          description: Game found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameDetailResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/stats/games/{game_id}/box-score:
    get:
      operationId: getBoxScore
      summary: Get detailed box score for a game
      description: >
        Returns the full box score for a game, including team-level shooting
        and possession stats plus per-player stat lines for both sides.
      tags: [games]
      parameters:
        - $ref: "#/components/parameters/GameIdPath"
      responses:
        "200":
          description: Box score
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BoxScoreResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/stats/games/{game_id}/result:
    get:
      operationId: getGameResult
      summary: Get detailed game result for bet grading
      description: >
        Returns the final result of a completed game, including scores,
        margin, total, overtime flag, and period-by-period scoring used by
        the bookie-emulator to grade paper bets.
      tags: [games]
      parameters:
        - $ref: "#/components/parameters/GameIdPath"
      responses:
        "200":
          description: Game result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameResultResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/stats/injuries:
    get:
      operationId: getInjuries
      summary: Get current injury reports
      description: >
        Returns the latest injury reports across supported leagues, filterable
        by league, team, and injury status for use in prediction pipelines.
      tags: [injuries]
      parameters:
        - name: league
          in: query
          schema:
            type: string
          description: Filter by league
        - name: team_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by team UUID
        - name: status
          in: query
          schema:
            type: string
          description: Injury status filter
      responses:
        "200":
          description: Injury reports
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InjuryListResponse"

  /api/v1/stats/matchup/{home_team_id}/{away_team_id}:
    get:
      operationId: getMatchup
      summary: Get matchup context between two teams
      description: >
        Returns head-to-head context for a home/away pairing, including
        historical results, rest days, and recent form for both teams to
        feed simulation and prediction features.
      tags: [matchup]
      parameters:
        - name: home_team_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: UUID of the home team
        - name: away_team_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: UUID of the away team
        - name: season
          in: query
          schema:
            type: integer
          description: Season year for matchup context (defaults to current)
        - name: league
          in: query
          schema:
            type: string
          description: League the matchup belongs to
      responses:
        "200":
          description: Matchup context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchupResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/stats/leagues:
    get:
      operationId: getLeagues
      summary: List all supported leagues with season metadata
      description: >
        Returns every league the service supports along with its sport,
        current season, season start and end dates, and active status.
      tags: [leagues]
      responses:
        "200":
          description: League list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeagueListResponse"

  /api/v1/stats/venues/{venue_id}:
    get:
      operationId: getVenue
      summary: Get venue details
      description: >
        Returns details for a single venue, including location, coordinates,
        capacity, playing surface, and whether it is a dome.
      tags: [venues]
      parameters:
        - name: venue_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: UUID of the venue to retrieve
      responses:
        "200":
          description: Venue found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VenueResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/stats/schedule:
    get:
      operationId: getSchedule
      summary: Get upcoming game schedule
      description: >
        Returns upcoming games as a paginated list, filterable by league,
        team, and a date range so downstream services can plan simulations.
      tags: [schedule]
      parameters:
        - name: league
          in: query
          schema:
            type: string
          description: Filter by league
        - name: date_from
          in: query
          schema:
            type: string
            format: date
          description: Include games on or after this date (YYYY-MM-DD)
        - name: date_to
          in: query
          schema:
            type: string
            format: date
          description: Include games on or before this date (YYYY-MM-DD)
        - name: team_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filter by team UUID
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Schedule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameListResponse"

components:
  parameters:
    TeamId:
      name: team_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: UUID of the team
    PlayerId:
      name: player_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: UUID of the player
    GameIdPath:
      name: game_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: UUID of the game
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        default: 50
        maximum: 200
      description: Maximum number of items to return (default 50, max 200)
    Cursor:
      name: cursor
      in: query
      schema:
        type: string
      description: Opaque pagination cursor from a previous response

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    Meta:
      type: object
      required: [timestamp, request_id]
      properties:
        timestamp:
          type: string
          format: date-time
        request_id:
          type: string
          format: uuid
        pagination:
          $ref: "#/components/schemas/PaginationMeta"

    PaginationMeta:
      type: object
      properties:
        limit:
          type: integer
        has_more:
          type: boolean
        next_cursor:
          type: string

    ErrorResponse:
      type: object
      required: [error, meta]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
        meta:
          $ref: "#/components/schemas/Meta"

    TeamSummary:
      type: object
      required: [id, league, name, abbreviation]
      properties:
        id:
          type: string
          format: uuid
        league_id:
          type: string
          format: uuid
        league:
          type: string
        name:
          type: string
        abbreviation:
          type: string
        location:
          type: string
        mascot:
          type: string
        conference:
          type: string
        division:
          type: string
        venue_id:
          type: string
          format: uuid
        active:
          type: boolean
        external_ids:
          type: object
          additionalProperties:
            type: string

    TeamListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/TeamSummary"
        meta:
          $ref: "#/components/schemas/Meta"

    VenueSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        city:
          type: string
        state:
          type: string

    SeasonSummary:
      type: object
      properties:
        season:
          type: integer
        wins:
          type: integer
        losses:
          type: integer
        win_pct:
          type: number
        points_per_game:
          type: number
        points_allowed_per_game:
          type: number
        offensive_rating:
          type: number
        defensive_rating:
          type: number

    TeamDetail:
      allOf:
        - $ref: "#/components/schemas/TeamSummary"
        - type: object
          properties:
            venue:
              $ref: "#/components/schemas/VenueSummary"
            season_summary:
              $ref: "#/components/schemas/SeasonSummary"

    TeamDetailResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/TeamDetail"
        meta:
          $ref: "#/components/schemas/Meta"

    OffensiveStats:
      type: object
      properties:
        points_per_game:
          type: number
        field_goal_pct:
          type: number
        three_point_pct:
          type: number
        free_throw_pct:
          type: number
        rebounds_per_game:
          type: number
        assists_per_game:
          type: number
        turnovers_per_game:
          type: number
        offensive_rating:
          type: number
        pace:
          type: number
        effective_fg_pct:
          type: number

    DefensiveStats:
      type: object
      properties:
        points_allowed_per_game:
          type: number
        opponent_fg_pct:
          type: number
        opponent_three_point_pct:
          type: number
        steals_per_game:
          type: number
        blocks_per_game:
          type: number
        defensive_rating:
          type: number

    AdvancedStats:
      type: object
      properties:
        net_rating:
          type: number
        true_shooting_pct:
          type: number
        turnover_pct:
          type: number
        offensive_rebound_pct:
          type: number

    SplitRecord:
      type: object
      properties:
        wins:
          type: integer
        losses:
          type: integer
        points_per_game:
          type: number
        points_allowed_per_game:
          type: number

    TeamStats:
      type: object
      properties:
        team_id:
          type: string
          format: uuid
        team_abbreviation:
          type: string
        season:
          type: integer
        games_played:
          type: integer
        stats:
          type: object
          properties:
            offensive:
              $ref: "#/components/schemas/OffensiveStats"
            defensive:
              $ref: "#/components/schemas/DefensiveStats"
            advanced:
              $ref: "#/components/schemas/AdvancedStats"
        home_away_splits:
          type: object
          properties:
            home:
              $ref: "#/components/schemas/SplitRecord"
            away:
              $ref: "#/components/schemas/SplitRecord"

    TeamStatsResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/TeamStats"
        meta:
          $ref: "#/components/schemas/Meta"

    PlayerSeasonStats:
      type: object
      properties:
        season:
          type: integer
        games_played:
          type: integer
        minutes_per_game:
          type: number
        points_per_game:
          type: number
        rebounds_per_game:
          type: number
        assists_per_game:
          type: number
        steals_per_game:
          type: number
        blocks_per_game:
          type: number
        field_goal_pct:
          type: number
        three_point_pct:
          type: number
        free_throw_pct:
          type: number

    PlayerSummary:
      type: object
      required: [id, team_id, first_name, last_name, position, status]
      properties:
        id:
          type: string
          format: uuid
        team_id:
          type: string
          format: uuid
        team_abbreviation:
          type: string
        first_name:
          type: string
        last_name:
          type: string
        position:
          type: string
        jersey_number:
          type: integer
        status:
          type: string
          enum: [ACTIVE, INJURED, OUT, SUSPENDED, INACTIVE]
        injury_description:
          type: string
          nullable: true
        external_ids:
          type: object
          additionalProperties:
            type: string

    PlayerDetail:
      allOf:
        - $ref: "#/components/schemas/PlayerSummary"
        - type: object
          properties:
            experience_years:
              type: integer
            season_stats:
              $ref: "#/components/schemas/PlayerSeasonStats"

    PlayerListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/PlayerSummary"
        meta:
          $ref: "#/components/schemas/Meta"

    PlayerDetailResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/PlayerDetail"
        meta:
          $ref: "#/components/schemas/Meta"

    TeamRef:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        abbreviation:
          type: string

    VenueRef:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string

    PeriodScore:
      type: object
      properties:
        period:
          type: integer
        home:
          type: integer
        away:
          type: integer

    GameResult:
      type: object
      properties:
        id:
          type: string
          format: uuid
        home_score:
          type: integer
        away_score:
          type: integer
        total_score:
          type: integer
        margin:
          type: integer
        overtime:
          type: boolean
        regulation_home_score:
          type: integer
          nullable: true
          description: Score at the end of regulation time. Null/absent means the
            final score is the settlement-relevant score. Populated for soccer
            matches decided in extra time (ADR-027).
        regulation_away_score:
          type: integer
          nullable: true
          description: Score at the end of regulation time. Null/absent means the
            final score is the settlement-relevant score.
        completed_at:
          type: string
          format: date-time
        period_scores:
          type: array
          items:
            $ref: "#/components/schemas/PeriodScore"

    Game:
      type: object
      required: [id, league, home_team, away_team, scheduled_start, status]
      properties:
        id:
          type: string
          format: uuid
        league:
          type: string
        home_team:
          $ref: "#/components/schemas/TeamRef"
        away_team:
          $ref: "#/components/schemas/TeamRef"
        venue:
          $ref: "#/components/schemas/VenueRef"
        scheduled_start:
          type: string
          format: date-time
        status:
          type: string
          enum: [SCHEDULED, IN_PROGRESS, FINAL, POSTPONED, CANCELLED, SUSPENDED]
        season:
          type: integer
        season_type:
          type: string
          enum: [PRESEASON, REGULAR, POSTSEASON, OFFSEASON]
        home_score:
          type: integer
          nullable: true
        away_score:
          type: integer
          nullable: true
        result:
          $ref: "#/components/schemas/GameResult"

    GameListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Game"
        meta:
          $ref: "#/components/schemas/Meta"

    GameDetailResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          $ref: "#/components/schemas/Game"
        meta:
          $ref: "#/components/schemas/Meta"

    PlayerBoxScore:
      type: object
      properties:
        player_id:
          type: string
          format: uuid
        player_name:
          type: string
        position:
          type: string
        minutes:
          type: number
        points:
          type: integer
        rebounds:
          type: integer
        assists:
          type: integer
        steals:
          type: integer
        blocks:
          type: integer
        turnovers:
          type: integer
        field_goals_made:
          type: integer
        field_goals_attempted:
          type: integer
        three_pointers_made:
          type: integer
        three_pointers_attempted:
          type: integer
        free_throws_made:
          type: integer
        free_throws_attempted:
          type: integer
        plus_minus:
          type: integer

    TeamBoxScore:
      type: object
      properties:
        id:
          type: string
          format: uuid
        abbreviation:
