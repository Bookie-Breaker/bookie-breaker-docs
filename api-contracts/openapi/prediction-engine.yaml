    ModelVersionData:
      properties:
        algorithm:
          title: Algorithm
          type: string
        evaluation_metrics:
          additionalProperties:
            type: number
          title: Evaluation Metrics
          type: object
        id:
          title: Id
          type: string
        is_active:
          title: Is Active
          type: boolean
        market_type:
          title: Market Type
          type: string
        notes:
          nullable: true
          title: Notes
          type: string
        role:
          default: champion
          title: Role
          type: string
        sport:
          title: Sport
          type: string
        training_date:
          title: Training Date
          type: string
        training_samples:
          title: Training Samples
          type: integer
        version_tag:
          title: Version Tag
          type: string
      required:
        - id
        - sport
        - market_type
        - version_tag
        - algorithm
        - training_date
        - training_samples
        - evaluation_metrics
        - is_active
