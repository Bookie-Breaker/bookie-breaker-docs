    ModelVersionDetailData:
      properties:
        algorithm:
          title: Algorithm
          type: string
        evaluation_metrics:
          additionalProperties:
            type: number
          title: Evaluation Metrics
          type: object
        feature_names:
          items:
            type: string
          title: Feature Names
          type: array
        id:
          title: Id
          type: string
        is_active:
          title: Is Active
          type: boolean
        market_type:
          title: Market Type
          type: string
        notes:
          nullable: true
          title: Notes
          type: string
        role:
          default: champion
          title: Role
          type: string
        sport:
          title: Sport
          type: string
        training_date:
          title: Training Date
          type: string
        training_samples:
          title: Training Samples
          type: integer
        version_tag:
          title: Version Tag
          type: string
      required:
        - id
        - sport
        - market_type
        - version_tag
        - algorithm
        - training_date
        - training_samples
        - evaluation_metrics
        - is_active
        - feature_names
      title: ModelVersionDetailData
      type: object
    PredictionDetailData:
      properties:
        adjustment_magnitude:
          title: Adjustment Magnitude
          type: number
        confidence_lower:
          nullable: true
          title: Confidence Lower
          type: number
        confidence_upper:
          nullable: true
          title: Confidence Upper
          type: number
        created_at:
          title: Created At
          type: string
        feature_importance:
          additionalProperties:
            type: number
          title: Feature Importance
          type: object
        feature_vector:
          $ref: "#/components/schemas/FeatureVectorData"
        game_id:
          title: Game Id
          type: string
        id:
          title: Id
          type: string
        is_shadow:
          default: false
          title: Is Shadow
          type: boolean
        market_type:
          title: Market Type
          type: string
        model_version_id:
          title: Model Version Id
          type: string
        player_external_id:
          nullable: true
          title: Player External Id
          type: string
        predicted_probability:
          title: Predicted Probability
          type: number
        prop_line:
          nullable: true
          title: Prop Line
          type: number
        selection:
          title: Selection
          type: string
        side:
          description: Selection side (HOME, AWAY, DRAW, OVER, UNDER, YES, NO). Null
            for predictions created before Phase 6.
          enum:
            - HOME
            - AWAY
            - DRAW
            - OVER
            - UNDER
            - "YES"
            - "NO"
          nullable: true
          title: Side
          type: string
        simulation_probability:
          nullable: true
          title: Simulation Probability
          type: number
        stat_type:
          nullable: true
          title: Stat Type
          type: string
      required:
        - id
        - game_id
        - model_version_id
        - market_type
        - selection
        - predicted_probability
        - simulation_probability
        - adjustment_magnitude
        - confidence_lower
        - confidence_upper
        - feature_importance
        - feature_vector
        - created_at
      title: PredictionDetailData
      type: object
    PredictionGroupData:
      properties:
        feature_source_versions:
          additionalProperties:
            nullable: true
            type: string
          title: Feature Source Versions
          type: object
        features_used:
          additionalProperties:
            anyOf:
              - type: number
              - type: integer
              - type: boolean
            nullable: true
          title: Features Used
          type: object
        game_id:
          title: Game Id
          type: string
        predictions:
          items:
            $ref: "#/components/schemas/PredictionItem"
          title: Predictions
          type: array
        simulation_run_id:
          title: Simulation Run Id
          type: string
      required:
        - game_id
        - simulation_run_id
        - predictions
        - features_used
        - feature_source_versions
      title: PredictionGroupData
      type: object
    PredictionItem:
      properties:
        adjustment_magnitude:
          title: Adjustment Magnitude
          type: number
        confidence_lower:
          nullable: true
          title: Confidence Lower
          type: number
        confidence_upper:
          nullable: true
          title: Confidence Upper
          type: number
        created_at:
          title: Created At
          type: string
        feature_importance:
          additionalProperties:
            type: number
          title: Feature Importance
          type: object
        id:
          title: Id
          type: string
        is_shadow:
          default: false
          title: Is Shadow
          type: boolean
        market_type:
          title: Market Type
          type: string
        model_version_id:
          title: Model Version Id
          type: string
        player_external_id:
          nullable: true
          title: Player External Id
          type: string
        predicted_probability:
          title: Predicted Probability
          type: number
        prop_line:
          nullable: true
          title: Prop Line
          type: number
        selection:
          title: Selection
          type: string
        side:
          description: Selection side (HOME, AWAY, DRAW, OVER, UNDER, YES, NO). Null
            for predictions created before Phase 6.
          enum:
            - HOME
            - AWAY
            - DRAW
            - OVER
            - UNDER
            - "YES"
            - "NO"
          nullable: true
          title: Side
          type: string
        simulation_probability:
          nullable: true
          title: Simulation Probability
          type: number
        stat_type:
          nullable: true
          title: Stat Type
          type: string
      required:
        - id
        - market_type
        - selection
        - predicted_probability
        - simulation_probability
        - adjustment_magnitude
        - confidence_lower
        - confidence_upper
        - model_version_id
        - feature_importance
        - created_at
      title: PredictionItem
      type: object
    PredictionRequest:
      properties:
        game_id:
          title: Game Id
          type: string
        market_types:
          items:
            enum:
              - SPREAD
              - TOTAL
              - MONEYLINE
            type: string
          title: Market Types
          type: array
        props:
          description: Player props to predict (requires a simulation run captured
            with player stats).
          items:
            $ref: "#/components/schemas/PropRequest"
          title: Props
          type: array
        simulation_run_id:
          title: Simulation Run Id
          type: string
      required:
        - game_id
        - simulation_run_id
      title: PredictionRequest
      type: object
    PromoteRequest:
      properties:
        force:
          default: false
          description: Promote even when the criteria are not met.
          title: Force
          type: boolean
      title: PromoteRequest
      type: object
    PromotionData:
      properties:
        forced:
          title: Forced
          type: boolean
        market_type:
          title: Market Type
          type: string
        model_version_ids:
          items:
            type: string
          title: Model Version Ids
          type: array
        promoted_version:
          title: Promoted Version
          type: string
        sport:
          title: Sport
          type: string
      required:
        - sport
        - market_type
        - promoted_version
        - model_version_ids
        - forced
      title: PromotionData
      type: object
    PropRequest:
      description: "One requested player prop (Phase 7 Wave 3).


        line is required for count/yardage stats and must exactly match a

        half-step line in the simulation's over grid; it stays None for yes/no

        stats. side None emits both OVER and UNDER rows (or the single YES row

        for yes/no stats)."
      properties:
        line:
          description: Prop line (half-step); null for yes/no stats.
          nullable: true
          title: Line
          type: number
        player_external_id:
          description: The statistics-service player UUID (as a string).
          title: Player External Id
          type: string
        player_name:
          nullable: true
          title: Player Name
          type: string
        side:
          description: Requested side; null emits both sides (or YES).
          enum:
            - OVER
            - UNDER
            - "YES"
            - "NO"
          nullable: true
          title: Side
          type: string
        stat_type:
          description: Canonical prop stat key (Odds API market key), e.g. player_points.
          title: Stat Type
          type: string
      required:
        - player_external_id
        - stat_type
      title: PropRequest
      type: object
    RetrainAcceptedData:
      properties:
        job_id:
          title: Job Id
          type: string
        sport:
          title: Sport
          type: string
        status:
          default: queued
          title: Status
          type: string
      required:
        - job_id
        - sport
      title: RetrainAcceptedData
      type: object
    RetrainRequest:
      description: 'Real retraining request (Phase 7 Wave 4).


        v1 covers game markets only; market="player_prop" 422s with the

        documented deferral (props settle against box scores, not joined yet).'
      properties:
        ensemble:
          default: false
          description: Train the GBT+RF ensemble instead of the single GBT.
          title: Ensemble
          type: boolean
        market:
          default: game
          enum:
            - game
            - player_prop
          title: Market
          type: string
        min_rows:
          default: 200
          description: Minimum assembled training rows to proceed.
          minimum: 1.0
          title: Min Rows
          type: integer
        sport:
          title: Sport
          type: string
      required:
        - sport
      title: RetrainRequest
      type: object
    RetrainStatusData:
      properties:
        detail:
          nullable: true
          title: Detail
          type: string
        ensemble:
          nullable: true
          title: Ensemble
          type: boolean
        job_id:
          title: Job Id
          type: string
        model_version_id:
          nullable: true
          title: Model Version Id
          type: string
        rows:
          nullable: true
          title: Rows
          type: integer
        sport:
          nullable: true
          title: Sport
          type: string
        status:
          title: Status
          type: string
        updated_at:
          nullable: true
          title: Updated At
          type: string
      required:
        - job_id
        - status
      title: RetrainStatusData
      type: object
    ValidationError:
      properties:
        ctx:
          title: Context
          type: object
        input:
          title: Input
        loc:
          items:
            anyOf:
              - type: string
              - type: integer
          title: Location
          type: array
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
      required:
        - loc
        - msg
        - type
      title: ValidationError
      type: object
info:
  contact:
    email: jsamuelsen11@gmail.com
    name: BookieBreaker
    url: https://github.com/Bookie-Breaker
  description: ML-calibrated probabilities and confidence intervals over simulation
    output.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  title: BookieBreaker Prediction Engine
  version: 1.0.0
openapi: 3.0.3
paths:
  /api/v1/predict/games/{game_id}/edges:
    get:
      description: Get edges for a game by comparing its latest predictions to current
        best lines.
      operationId: edges_for_game_api_v1_predict_games__game_id__edges_get
      parameters:
        - description: The statistics-service game identifier.
          in: path
          name: game_id
          required: true
          schema:
            description: The statistics-service game identifier.
            title: Game Id
            type: string
        - description: Minimum edge percentage to include.
          in: query
          name: min_edge
          required: false
          schema:
            default: 0.0
            description: Minimum edge percentage to include.
            title: Min Edge
            type: number
        - description: Filter by market type.
          in: query
          name: market_type
          required: false
          schema:
            description: Filter by market type.
            nullable: true
            title: Market Type
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope_EdgesData_"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Edges For Game
      tags:
        - edges
  /api/v1/predict/games/{game_id}/latest:
    get:
      description: Get the most recent prediction per market type for a game.
      operationId: latest_predictions_api_v1_predict_games__game_id__latest_get
      parameters:
        - description: The statistics-service game identifier.
          in: path
          name: game_id
          required: true
          schema:
            description: The statistics-service game identifier.
            title: Game Id
            type: string
        - description: Filter by market type; comma-separated for multiple.
          in: query
          name: market_type
          required: false
          schema:
            description: Filter by market type; comma-separated for multiple.
            nullable: true
            title: Market Type
            type: string
        - description: Filter by a specific model version.
          in: query
          name: model_version
          required: false
          schema:
            description: Filter by a specific model version.
            format: uuid
            nullable: true
            title: Model Version
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope_LatestPredictionsData_"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Latest Predictions
      tags:
        - predictions
  /api/v1/predict/health:
    get:
      description: "Liveness plus dependency status. Returns 200 even when degraded
        so

        container healthchecks measure this service, not its dependencies."
      operationId: get_health_api_v1_predict_health_get
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope_HealthData_"
          description: Successful Response
      summary: Get Health
      tags:
        - health
  /api/v1/predict/models:
    get:
      description: List model versions, newest first.
      operationId: list_models_api_v1_predict_models_get
      parameters:
        - description: Filter by sport (e.g. BASKETBALL).
          in: query
          name: sport
          required: false
          schema:
            description: Filter by sport (e.g. BASKETBALL).
            nullable: true
            title: Sport
            type: string
        - description: Filter by market type.
          in: query
          name: market_type
          required: false
          schema:
            description: Filter by market type.
            nullable: true
            title: Market Type
            type: string
        - description: Filter by active status.
          in: query
          name: is_active
          required: false
          schema:
            description: Filter by active status.
            nullable: true
            title: Is Active
            type: boolean
        - description: Filter by role (champion, challenger, shadow).
          in: query
          name: role
          required: false
          schema:
            description: Filter by role (champion, challenger, shadow).
            nullable: true
            title: Role
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope_list_ModelVersionData__"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: List Models
      tags:
        - models
  /api/v1/predict/models/experiments/{sport}/{market_type}:
    get:
      description: Champion vs challenger over graded shadow pairs (404 without an
        active challenger).
      operationId: get_experiment_api_v1_predict_models_experiments__sport___market_type__get
      parameters:
        - description: Model key (sport, or NCAA_BB).
          in: path
          name: sport
          required: true
          schema:
            description: Model key (sport, or NCAA_BB).
            title: Sport
            type: string
        - description: Game market type (SPREAD, TOTAL, MONEYLINE).
          in: path
          name: market_type
          required: true
          schema:
            description: Game market type (SPREAD, TOTAL, MONEYLINE).
            title: Market Type
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope_ExperimentData_"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Get Experiment
      tags:
        - models
  /api/v1/predict/models/experiments/{sport}/{market_type}/promote:
    post:
      description: "Promote the active challenger to champion (atomic role flip across
        the unified model's markets).


        Fails 422 with the blocking criteria unless force=true. The outgoing

        champion is retired (deactivated, role=shadow)."
      operationId: promote_challenger_api_v1_predict_models_experiments__sport___market_type__promote_post
      parameters:
        - description: Model key (sport, or NCAA_BB).
          in: path
          name: sport
          required: true
          schema:
            description: Model key (sport, or NCAA_BB).
            title: Sport
            type: string
        - description: Game market type the criteria are evaluated on.
          in: path
          name: market_type
          required: true
          schema:
            description: Game market type the criteria are evaluated on.
            title: Market Type
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PromoteRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope_PromotionData_"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Promote Challenger
      tags:
        - models
  /api/v1/predict/models/retrain:
    post:
      description: "Enqueue a real retraining job (202); poll GET /models/retrain/{job_id}.


        The job assembles graded outcomes from stored predictions + feature

        vectors, trains walk-forward, and registers the result as an ACTIVE

        CHALLENGER that shadow-scores until promoted."
      operationId: retrain_model_api_v1_predict_models_retrain_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RetrainRequest"
        required: true
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope_RetrainAcceptedData_"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Retrain Model
      tags:
        - models
