          type: array
      title: HTTPValidationError
      type: object
    HealthData:
      properties:
        active_models:
          additionalProperties:
            type: string
          title: Active Models
          type: object
        dependencies:
          additionalProperties:
            type: string
          title: Dependencies
          type: object
        service:
          default: prediction-engine
          title: Service
          type: string
        status:
          title: Status
          type: string
        uptime_seconds:
          title: Uptime Seconds
          type: integer
        version:
          title: Version
          type: string
      required:
        - status
        - version
        - uptime_seconds
        - dependencies
        - active_models
      title: HealthData
      type: object
    LatestPredictionsData:
      properties:
        game_id:
          title: Game Id
          type: string
        predictions:
          items:
            $ref: "#/components/schemas/PredictionItem"
          title: Predictions
          type: array
      required:
