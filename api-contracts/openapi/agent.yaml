        cron_expression:
          title: Cron Expression
          type: string
        description:
          nullable: true
          title: Description
          type: string
        enabled:
          title: Enabled
          type: boolean
        id:
          title: Id
          type: string
        last_run_at:
          nullable: true
          title: Last Run At
          type: string
        league:
          title: League
          type: string
        min_edge_threshold:
          title: Min Edge Threshold
          type: number
        next_run_at:
          nullable: true
          title: Next Run At
          type: string
        simulation_config:
          additionalProperties: true
          nullable: true
          title: Simulation Config
          type: object
        timezone:
          title: Timezone
          type: string
      required:
        - id
        - league
        - cron_expression
        - timezone
        - description
        - enabled
        - last_run_at
        - next_run_at
        - simulation_config
        - auto_bet
        - min_edge_threshold
      title: ScheduleData
      type: object
    ScheduleListData:
      properties:
        schedules:
          items:
            $ref: "#/components/schemas/ScheduleData"
          title: Schedules
          type: array
      required:
        - schedules
      title: ScheduleListData
      type: object
    ScheduleRequest:
      properties:
        auto_bet:
          default: true
          title: Auto Bet
          type: boolean
        cron_expression:
          title: Cron Expression
          type: string
        description:
          nullable: true
          title: Description
          type: string
        enabled:
          default: true
          title: Enabled
          type: boolean
        league:
          title: League
          type: string
        min_edge_threshold:
          default: 3.0
          minimum: 0.0
          title: Min Edge Threshold
          type: number
        simulation_config:
          additionalProperties: true
          nullable: true
          title: Simulation Config
          type: object
        timezone:
          default: UTC
          title: Timezone
          type: string
      required:
        - league
        - cron_expression
      title: ScheduleRequest
      type: object
    SlateData:
      properties:
        date:
          title: Date
          type: string
        games:
          items:
            $ref: "#/components/schemas/SlateGame"
          title: Games
          type: array
      required:
        - date
        - games
      title: SlateData
      type: object
    SlateEdge:
      properties:
        edge_percentage:
          title: Edge Percentage
          type: number
        has_paper_bet:
          title: Has Paper Bet
          type: boolean
        id:
          title: Id
          type: string
        market_type:
          title: Market Type
          type: string
        selection:
          title: Selection
          type: string
        sportsbook_key:
          title: Sportsbook Key
          type: string
      required:
        - id
        - market_type
        - selection
        - edge_percentage
        - sportsbook_key
        - has_paper_bet
      title: SlateEdge
      type: object
    SlateGame:
      properties:
        away_team:
          $ref: "#/components/schemas/SlateTeam"
        edges:
          items:
            $ref: "#/components/schemas/SlateEdge"
          title: Edges
          type: array
        game_id:
          title: Game Id
          type: string
        home_team:
          $ref: "#/components/schemas/SlateTeam"
        league:
          title: League
          type: string
        prediction:
          allOf:
            - $ref: "#/components/schemas/SlatePrediction"
          nullable: true
        scheduled_start:
          title: Scheduled Start
          type: string
        status:
          title: Status
          type: string
      required:
        - game_id
        - league
        - home_team
        - away_team
        - scheduled_start
        - status
        - prediction
        - edges
      title: SlateGame
      type: object
    SlatePrediction:
      properties:
        id:
          title: Id
          type: string
        market_type:
          title: Market Type
          type: string
        predicted_at:
          title: Predicted At
          type: string
        predicted_probability:
          title: Predicted Probability
          type: number
        selection:
          title: Selection
          type: string
      required:
        - id
        - market_type
        - selection
        - predicted_probability
        - predicted_at
      title: SlatePrediction
      type: object
    SlateTeam:
      properties:
        abbreviation:
          title: Abbreviation
          type: string
        id:
          title: Id
          type: string
        name:
          title: Name
          type: string
      required:
        - id
        - name
        - abbreviation
      title: SlateTeam
      type: object
    TopEdge:
      properties:
        edge_percentage:
          title: Edge Percentage
          type: number
        id:
          title: Id
          type: string
        selection:
          title: Selection
          type: string
        sportsbook_key:
          title: Sportsbook Key
          type: string
      required:
        - id
        - selection
        - edge_percentage
        - sportsbook_key
      title: TopEdge
      type: object
    ValidationError:
      properties:
        ctx:
          title: Context
          type: object
        input:
          title: Input
        loc:
          items:
            anyOf:
              - type: string
              - type: integer
          title: Location
          type: array
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
      required:
        - loc
        - msg
        - type
      title: ValidationError
      type: object
info:
  contact:
    email: jsamuelsen11@gmail.com
    name: BookieBreaker
    url: https://github.com/Bookie-Breaker
  description: Pipeline orchestration, edge detection, and dashboard aggregation across
    all backend services.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  title: BookieBreaker Agent
  version: 1.0.0
openapi: 3.0.3
paths:
  /api/v1/agent/alerts:
    get:
      description: List delivered edge alerts, newest first.
      operationId: list_alerts_api_v1_agent_alerts_get
      parameters:
        - description: "Filter by priority: LOW, MEDIUM, HIGH."
          in: query
          name: priority
          required: false
          schema:
            description: "Filter by priority: LOW, MEDIUM, HIGH."
            nullable: true
            title: Priority
            type: string
        - description: Filter by acknowledgement state.
          in: query
          name: acknowledged
          required: false
          schema:
            description: Filter by acknowledgement state.
            nullable: true
            title: Acknowledged
            type: boolean
        - description: Max results per page.
          in: query
          name: limit
          required: false
          schema:
            default: 50
            description: Max results per page.
            maximum: 200
            minimum: 1
            title: Limit
            type: integer
        - description: Opaque pagination cursor.
          in: query
          name: cursor
          required: false
          schema:
            description: Opaque pagination cursor.
            nullable: true
            title: Cursor
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageEnvelope_AlertData_"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: List Alerts
      tags:
        - alerts
  /api/v1/agent/alerts/{alert_id}/acknowledge:
    put:
      description: Mark an alert as acknowledged (idempotent).
      operationId: acknowledge_alert_api_v1_agent_alerts__alert_id__acknowledge_put
      parameters:
        - description: The alert identifier.
          in: path
          name: alert_id
          required: true
          schema:
            description: The alert identifier.
            format: uuid
            title: Alert Id
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope_AlertData_"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Acknowledge Alert
      tags:
        - alerts
  /api/v1/agent/analysis:
    post:
      description: "Generate an LLM analysis for a game, edge, or performance period.


        Cached analyses for the same subject are reused (200) instead of

        re-generated; free-form questions always generate fresh output (201)."
      operationId: create_analysis_api_v1_agent_analysis_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalysisRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope_AnalysisData_"
          description: Reused a cached analysis.
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope_AnalysisData_"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Create Analysis
      tags:
        - analysis
  /api/v1/agent/analysis/stream:
    post:
      description: "Generate an LLM analysis, streaming text deltas over SSE.


        Same request body and semantics as POST /analysis; cached analyses

        replay as a single chunk. Validation, unknown-id, and degraded-LLM

        failures return the standard JSON error envelope before any SSE bytes."
      operationId: create_analysis_stream_api_v1_agent_analysis_stream_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalysisRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema: {}
            text/event-stream:
              schema:
                type: string
          description: 'SSE stream: `chunk` events ({"text": delta}) followed by a
            terminal `done` event carrying the persisted analysis envelope (meta.cached
            indicates a cache replay), or `error` on a mid-stream LLM failure.'
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Create Analysis Stream
      tags:
        - analysis
  /api/v1/agent/analysis/{analysis_id}:
    get:
      description: Fetch a previously generated analysis.
      operationId: get_analysis_api_v1_agent_analysis__analysis_id__get
      parameters:
        - description: The analysis identifier.
          in: path
          name: analysis_id
          required: true
          schema:
            description: The analysis identifier.
            format: uuid
            title: Analysis Id
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope_AnalysisData_"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Get Analysis
      tags:
        - analysis
  /api/v1/agent/dashboard:
    get:
      description: "Aggregated edges, recent performance, and pipeline status.


        next_scheduled_run stays null until Phase 4 cron scheduling."
      operationId: get_dashboard_api_v1_agent_dashboard_get
      parameters:
        - description: Filter by league; comma-separated for multiple.
          in: query
          name: league
          required: false
          schema:
            description: Filter by league; comma-separated for multiple.
            nullable: true
            title: League
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope_DashboardData_"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Get Dashboard
      tags:
        - dashboard
  /api/v1/agent/edges:
    get:
      description: List currently detected edges (fresh and unexpired by default).
      operationId: list_edges_api_v1_agent_edges_get
      parameters:
        - description: Filter by league; comma-separated for multiple.
          in: query
          name: league
          required: false
          schema:
            description: Filter by league; comma-separated for multiple.
            nullable: true
            title: League
            type: string
        - description: Filter by game date (ISO 8601 date).
          in: query
          name: date
          required: false
          schema:
            description: Filter by game date (ISO 8601 date).
            format: date
            nullable: true
            title: Date
            type: string
        - description: Minimum edge percentage to include.
          in: query
          name: min_edge
          required: false
          schema:
            default: 0.0
            description: Minimum edge percentage to include.
            minimum: 0.0
            title: Min Edge
            type: number
        - description: Filter by market type.
          in: query
          name: market_type
          required: false
          schema:
            description: Filter by market type.
            nullable: true
            title: Market Type
            type: string
        - description: "Include stale edges (default: only fresh edges)."
          in: query
          name: is_stale
          required: false
          schema:
            default: false
            description: "Include stale edges (default: only fresh edges)."
            title: Is Stale
            type: boolean
        - description: Max results per page.
          in: query
          name: limit
          required: false
          schema:
            default: 50
            description: Max results per page.
            maximum: 200
            minimum: 1
            title: Limit
            type: integer
        - description: Opaque pagination cursor.
          in: query
          name: cursor
          required: false
          schema:
            description: Opaque pagination cursor.
            nullable: true
            title: Cursor
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PageEnvelope_EdgeListItem_"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: List Edges
      tags:
        - edges
  /api/v1/agent/edges/{edge_id}:
    get:
      description: "Edge detail with live-fetched prediction, line, and paper bet.


        Nested objects are fetched from their owning services and are null when

        the owning service is unavailable; analysis is the newest stored LLM

        analysis for this edge, or null when none exists."
      operationId: get_edge_api_v1_agent_edges__edge_id__get
      parameters:
        - description: The edge identifier.
          in: path
          name: edge_id
          required: true
          schema:
            description: The edge identifier.
            format: uuid
            title: Edge Id
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope_EdgeDetailData_"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Get Edge
      tags:
        - edges
  /api/v1/agent/health:
    get:
      description: Agent liveness plus per-dependency status (200 even when degraded).
      operationId: get_health_api_v1_agent_health_get
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope_HealthData_"
          description: Successful Response
      summary: Get Health
      tags:
        - health
  /api/v1/agent/parlays/evaluate:
    post:
      description: "Evaluate a 2-6 leg team-market parlay with correlation-aware math.


        Same-game legs use the simulation engine's joint outcome structure

        (falling back to documented correlation priors); distinct games

        multiply as independent. meets_threshold evaluations are persisted and

        published to events:parlay.detected; persist=true also stores

        below-threshold evaluations. Returns 422 for mixed-league leg sets,

        mutually exclusive legs, or unsupported (prop) markets."
      operationId: evaluate_parlay_api_v1_agent_parlays_evaluate_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ParlayEvaluateRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope_ParlayEvaluationData_"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Evaluate Parlay
      tags:
        - parlays
  /api/v1/agent/pipeline/run:
    post:
      description: "Trigger a full pipeline run (always asynchronous in Phase 3).


        Returns 409 when a run for the same league is already running; poll

        GET /pipeline/runs/{pipeline_run_id} for progress."
      operationId: run_pipeline_api_v1_agent_pipeline_run_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PipelineRunRequest"
        required: true
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope_PipelineRunAcceptedData_"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Run Pipeline
      tags:
        - pipeline
  /api/v1/agent/pipeline/runs/{pipeline_run_id}:
    get:
      description: Get the status, per-step outcomes, and counters of a pipeline run.
      operationId: get_pipeline_run_api_v1_agent_pipeline_runs__pipeline_run_id__get
      parameters:
        - description: The pipeline run identifier.
          in: path
          name: pipeline_run_id
          required: true
          schema:
            description: The pipeline run identifier.
            format: uuid
            title: Pipeline Run Id
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope_PipelineRunData_"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Get Pipeline Run
      tags:
        - pipeline
  /api/v1/agent/schedule:
    get:
      description: Current pipeline schedule configuration for all leagues.
      operationId: list_schedules_api_v1_agent_schedule_get
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope_ScheduleListData_"
          description: Successful Response
      summary: List Schedules
      tags:
        - schedule
    post:
      description: Create (201) or update (200) the league's pipeline schedule.
      operationId: upsert_schedule_api_v1_agent_schedule_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScheduleRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope_ScheduleData_"
          description: Updated the league's schedule.
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope_ScheduleData_"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Upsert Schedule
      tags:
        - schedule
  /api/v1/agent/slate:
    get:
      description: A date's games with prediction summaries and active edges.
      operationId: get_slate_api_v1_agent_slate_get
      parameters:
        - description: Filter by league; comma-separated for multiple.
          in: query
          name: league
          required: false
          schema:
            description: Filter by league; comma-separated for multiple.
            nullable: true
            title: League
            type: string
        - description: Game date (ISO 8601 date); defaults to today.
          in: query
          name: date
          required: false
          schema:
            description: Game date (ISO 8601 date); defaults to today.
            format: date
            nullable: true
            title: Date
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope_SlateData_"
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HTTPValidationError"
          description: Validation Error
      summary: Get Slate
      tags:
        - slate
servers:
  - description: Local development
    url: http://localhost:8006
tags:
  - description: Delivered edge alerts with acknowledgement.
    name: alerts
  - description: LLM-generated edge, game, and performance analyses.
    name: analysis
  - description: Aggregated edges, performance, and pipeline status.
    name: dashboard
  - description: Detected positive-EV edges against de-vigged market prices.
    name: edges
  - description: Service health and downstream dependency status.
    name: health
  - description: Correlation-aware parlay evaluation over detected edges.
    name: parlays
  - description: Trigger and inspect prediction pipeline runs.
    name: pipeline
  - description: Cron schedules for automated pipeline runs.
    name: schedule
  - description: A date's games with prediction summaries and active edges.
    name: slate
